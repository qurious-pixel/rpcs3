name: MacOS

on: 
  push:
  
jobs:
  MacOS:     
    name: MacOS build of LLVM15 
    runs-on: macos-12
    env:
      QT_VER: 5.15.2
      QT_VER_MAIN: 5
    steps:
      - name: Checkout Upstream Repo
        uses: actions/checkout@v3
        with:
          repository: Nekotekina/rpcs3 # RPCS3/rpcs3 # 
          ref: typei # Qt6-fun # 07395dd8fa0848268ad9818fc43a216bd3da5a1c # master #
          submodules: recursive
      - name: Checkout AppImage Repo
        uses: actions/checkout@v3
        with:
            clean: false
            path: ci      
      #- name: cache
      #  uses: actions/cache@v3
      #  with:
      #    path: ~/.ccache
      #    key: build-ccache-Qt${{ env.QT_VER_MAIN }}-${{ env.GITHUB_RUN_ID }}
      #    restore-keys: |
      #      build-ccache-Qt${{ env.QT_VER_MAIN }}
      #      build-ccache
      #- uses: actions/setup-python@v3
      #  with:
      #    python-version: '3.10'
      #- uses: actions/setup-go@v3

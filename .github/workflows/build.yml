      - name: Environmental Variables
        run: |
          echo CXX="/opt/local/bin/clang++-mp-15" >> $GITHUB_ENV
          echo CC="/opt/local/bin/clang-mp-15" >> $GITHUB_ENV
          echo CMAKE_EXTRA_OPTS='-DLLVM_TARGETS_TO_BUILD=X86' >> $GITHUB_ENV
          export WORKDIR="$(pwd)"
          echo WORKDIR="$(pwd)" >> $GITHUB_ENV
          #echo PATH="$BREW_PATH/opt/ccache/libexec:$BREW_PATH/opt/llvm/bin:$WORKDIR/qt-downloader/${{ env.QT_VER }}/clang_64/bin:$BREW_BIN:$BREW_SBIN:/usr/bin:/bin:/usr/sbin:/sbin:/opt/X11/bin:/Library/Apple/usr/bin:$PATH" >> $GITHUB_ENV
          echo LDFLAGS="-Wl,-rpath,$BREW_X64_PATH/lib" >> $GITHUB_ENV
          echo CPPFLAGS="-msse -msse2 -mcx16 -no-pie" >> $GITHUB_ENV
          #echo LIBRARY_PATH="$BREW_X64_PATH/lib" >> $GITHUB_ENV
          #echo LD_LIBRARY_PATH="$BREW_X64_PATH/lib" >> $GITHUB_ENV
          echo LLVM_DIR="/opt/local/libexec/llvm-15/lib/cmake/llvm" >> $GITHUB_ENV
          echo RANLIB="/opt/local/bin/llvm-ranlib-mp-15" >> $GITHUB_ENV
          echo AR="/opt/local/bin/llvm-ar-mp-15" >> $GITHUB_ENV

      - name: Fixes
        run: |
          echo "fixes"
          sed -i '' "s/extern const double NSAppKitVersionNumber;/const double NSAppKitVersionNumber = 1343;/g" 3rdparty/hidapi/hidapi/mac/hid.c
          sed -i '' -e 's/GLEW 1.13.0/GLEW/g' 3rdparty/CMakeLists.txt
          #mv "$BREW_PATH"/opt/llvm/lib/cmake/llvm/Findzstd.cmake "$BREW_PATH"/opt/llvm/lib/cmake/llvm/Findzstd.cmake.old
          #curl -sSfl https://raw.githubusercontent.com/llvm/llvm-project/main/llvm/cmake/modules/Findzstd.cmake -o "$BREW_PATH"/opt/llvm/lib/cmake/llvm/Findzstd.cmake
          #diff "$BREW_PATH"/opt/llvm/lib/cmake/llvm/Findzstd.cmake "$BREW_PATH"/opt/llvm/lib/cmake/llvm/Findzstd.cmake.old

      - name: Build RPCS3
        run: |
          ccache --version; ccache -z
          mkdir build && cd build || exit 1
          cmake .. \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DUSE_SDL=ON -DUSE_DISCORD_RPC=OFF -DUSE_VULKAN=ON -DUSE_ALSA=OFF -DUSE_PULSE=OFF -DUSE_AUDIOUNIT=ON \
              -DWITH_LLVM=ON \
              -DUSE_NATIVE_INSTRUCTIONS=OFF \
              -DUSE_SYSTEM_MVK=ON \
              $CMAKE_EXTRA_OPTS \
              -G Ninja
          ninja; build_status=$?;
          ccache -s
           

      #    go-version: '>=1.19.0'

      - name: Install packages
        run: |
          echo "MacPorts 2.8.1"
          git clone https://github.com/macports/macports-base.git
          cd macports-base
          ./configure && make && sudo make install
          export PATH=/opt/local/bin:$PATH
          echo PATH=/opt/local/bin:$PATH >> $GITHUB_ENV
          sudo port selfupdate
          cd ..
          pwd
          sudo port install libsdl2 qt5 llvm-15 clang-15 ninja nasm ccache glew vulkan-loader vulkan-headers
          sudo cp ci/sources.conf /opt/local/etc/macports/
          sudo mkdir -p /opt/local/ports/graphics/MoltenVK
          sudo cp ci/Portfile /opt/local/ports/graphics/MoltenVK/
          cd /opt/local/ports
          sudo portindex
          sudo port install MoltenVK
          #ls !break
          #brew install llvm --HEAD
          #brew install -f --overwrite nasm ninja create-dmg ccache sdl2 glew
          #arch -x86_64 /usr/local/homebrew/bin/brew install -f --overwrite zstd llvm 
          #pip install --upgrade pip
          
      #- name: Install Qt
      #  run: |
      #    curl -sLO https://files.pythonhosted.org/packages/47/42/351389ca36c7adfc5f4e92d086cdb2bdbde13f1b89ee882f4a1cab2183ac/yaqti-2021.7.29-py3-none-any.whl

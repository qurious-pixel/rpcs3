name: Build RPCS3

defaults:
  run:
    shell: bash
on:
  push:
    branches:
      - master # Only trigger push event on 'master' branch
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  BUILD_REPOSITORY_NAME: ${{ github.repository }}
  BUILD_SOURCEBRANCHNAME: ${{ github.ref_name }}
  BUILD_SOURCEVERSION: ${{ github.sha }}
  BUILD_ARTIFACTSTAGINGDIRECTORY: ${{ github.workspace }}/artifacts/

jobs:
  FreeBSD_Build:
    # Only run push event on master branch of main repo, but run all PRs
    if: github.event_name != 'push' || (github.repository == 'RPCS3/rpcs3' && github.ref_name == 'master')
    name: RPCS3 FreeBSD 
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: /tmp/ccache_dir
      CI_HAS_ARTIFACTS: true
      ARTDIR: "/root/artifacts"
      RELEASE_MESSAGE: "/rpcs3/GitHubReleaseMessage.txt"
      #COMPILER: ${{ matrix.compiler }}
      #UPLOAD_COMMIT_HASH: ${{ matrix.UPLOAD_COMMIT_HASH }}
      #UPLOAD_REPO_FULL_NAME: ${{ matrix.UPLOAD_REPO_FULL_NAME }}
      #RUN_UNIT_TESTS: github.event_name == 'pull_request' && 'ON' || 'OFF'
      QT_VER: '6.9.1'
      QT_VER_MAIN: '6'
      LLVM_COMPILER_VER: '19'
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          submodules: recursive
      - name: FreeBSD build
        id: root
        uses: vmactions/freebsd-vm@v1
        with:
          envs: 'QT_VER_MAIN LLVM_COMPILER_VER'
          usesh: true
          prepare: |
            pkg install -y "llvm$LLVM_COMPILER_VER"
            pkg install -y git ccache cmake ninja "qt$QT_VER_MAIN-multimedia" "qt$QT_VER_MAIN-svg" glew openal-soft ffmpeg
            pkg install -y pkgconf alsa-lib pulseaudio sdl3 evdev-proto vulkan-headers vulkan-loader
      
          run: |
            set -x
            #git config --global --add safe.directory .
            #.ci/build-freebsd.sh
            #git submodule update --init --depth 1 $(awk '/path/ && !/llvm/ && !/opencv/ && !/libpng/ && !/libsdl-org/ && !/curl/ { print $3 }' .gitmodules)

            CONFIGURE_ARGS="
            	-DWITH_LLVM=ON
            	-DUSE_SDL=OFF
            	-DUSE_PRECOMPILED_HEADERS=OFF
            	-DUSE_NATIVE_INSTRUCTIONS=OFF
            	-DUSE_SYSTEM_FFMPEG=ON
            	-DUSE_SYSTEM_CURL=ON
            	-DUSE_SYSTEM_LIBPNG=ON
            	-DUSE_SYSTEM_OPENCV=ON
            "
            
            # base Clang workaround (missing clang-scan-deps)
            CONFIGURE_ARGS="$CONFIGURE_ARGS -DCMAKE_CXX_SCAN_FOR_MODULES=OFF"
            
            # shellcheck disable=SC2086
            cmake -B build -G Ninja $CONFIGURE_ARGS
            cmake --build build
            
            ccache --show-stats
            ccache --zero-stats

      #- name: Upload artifacts
      #  uses: actions/upload-artifact@main
      #  with:
      #    name: RPCS3 for FreeBSD
      #    path: ${{ env.BUILD_ARTIFACTSTAGINGDIRECTORY }}
      #    compression-level: 0
     
      - name: Save Build Ccache
        if: github.ref == 'refs/heads/master'
        uses: actions/cache/save@main
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ steps.restore-build-ccache.outputs.cache-primary-key }}
